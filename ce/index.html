<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CE:yo phone lingin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: url("https://i.ibb.co/fGz0KHmg/2026-04-05-091859.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        audio {
            display: none;
        }
        /* 提示文字样式 */
        #tip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<audio id="bg-music" loop playsinline>
<div id="tip">🎵 背景音乐加载中，点击页面播放声音</div>

<script>
    const audio = document.getElementById('bg-music');
    const tip = document.getElementById('tip');

    audio.src = "https://tiengdong.com/wp-content/uploads/your-phone-linging-ringtone-th-www_tiengdong_com.mp3?_=1";
    audio.muted = true;
    audio.loop = true;
    audio.volume = 1;

    // 自动静音播放
    async function autoPlay() {
        try {
            await audio.play();
            tip.textContent = "🎵 已自动播放（静音），点击页面出声";
        } catch (err) {
            tip.textContent = "🎵 点击页面开始播放音乐";
            console.log("自动播放被限制：", err);
        }
    }

    // 点击解锁声音
    function unlockSound() {
        audio.muted = false;
        if (audio.paused) audio.play();
        tip.textContent = "🎵 背景音乐播放中";
        
        document.removeEventListener('click', unlockSound);
        document.removeEventListener('touchstart', unlockSound);
    }

    autoPlay();
    document.addEventListener('click', unlockSound);
    document.addEventListener('touchstart', unlockSound);
</script>

</body>
</html>
