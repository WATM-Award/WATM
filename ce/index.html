<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CE:yo phone lingin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: url("https://i.ibb.co/fGz0KHmg/2026-04-05-091859.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            overflow: hidden;
            cursor: pointer;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

<audio id="bg-music" loop playsinline>

<script>
    const audio = document.getElementById('bg-music');
    audio.src = "https://tiengdong.com/wp-content/uploads/your-phone-linging-ringtone-th-www_tiengdong_com.mp3?_=1";
    audio.muted = true;    // 一开始静音，才能自动播放
    audio.loop = true;

    // 自动播放（静音）
    async function autoPlay() {
        try {
            await audio.play();
            console.log("✅ 静音自动播放成功");
        } catch (err) {
            console.log("❌ 自动播放被限制", err);
        }
    }

    // 用户交互后解锁声音
    function unlock() {
        audio.muted = false;
        audio.volume = 1;
        
        // 防止没在播
        if (audio.paused) audio.play();
        
        document.removeEventListener('click', unlock);
        document.removeEventListener('touchstart', unlock);
    }

    // 启动
    autoPlay();
    document.addEventListener('click', unlock);
    document.addEventListener('touchstart', unlock);
</script>

</body>
</html>
