<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CE:yo phone lingin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: url("https://i.ibb.co/fGz0KHmg/2026-04-05-091859.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            overflow: hidden;
            cursor: pointer;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

<audio id="bg-music" autoplay muted loop playsinline>
    <source src="https://tiengdong.com/wp-content/uploads/your-phone-linging-ringtone-th-www_tiengdong_com.mp3?_=1" type="audio/mpeg">
    你的浏览器不支持音频播放


<script>
    const audio = document.getElementById('bg-music');

    // 页面一加载就尝试播放（静音自动播）
    audio.play().catch(err => {
        console.log('自动播放被浏览器限制:', err);
    });

    // 用户点击页面 → 取消静音，正常播放
    function unlockSound() {
        audio.muted = false;
        // 只执行一次
        document.removeEventListener('click', unlockSound);
        document.removeEventListener('touchstart', unlockSound);
    }

    document.addEventListener('click', unlockSound);
    document.addEventListener('touchstart', unlockSound);
</script>

</body>
</html>
